<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form action="/action_page.html">
            <fieldset>
                <legend>Sistema de gestão academica</legend>

                <h3>Manutenção de usuários do Sistema Interno</h3>

                <label for="pnome">Login: </label><br>
                <input type="text" id="pnome" name="pnome"><br>       
                <label for="unome">Senha:</label><br>
                <input type="text" id="unome" name="unome"><br><br>

                <label for="status">Status:</label>
                <select name="status" id="status">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select><br><br>
                
                <legend>Tipo: </legend>
                <input type="radio" id="Tecnico" name="tipo" value="Tecnico">
                <label for="html">Técnico</label>
                <input type="radio" id="Professor" name="tipo" value="Professor">
                <label for="css">Professor</label>
                <input type="radio" id="Aluno" name="tipo" value="Aluno">
                <label for="javascript">Aluno</label><br><br>

                <!--Data de criação-->
                <legend>Data de criação: </legend>
                <input type="date" id="dataCriacao" name="dataCriacao" value="convidado"><br><br>
                

                <legend>Perfil: </legend>
                <input type="radio" id="convidado" name="perfil" value="convidado">
                <label for="html">Convidado</label>
                <input type="radio" id="Administrador" name="perfil" value="Administrador">
                <label for="css">Administrador</label><br><br>

                <label for="obs">Observações:</label><br>
                <textarea id="obs" name="obs" rows="4" cols="50"></textarea><br><br> 

                <legend>Módulos:</legend>
                <input type="checkbox" id="mod1" name="mod1" value="Compras">
                <label for="mod1"> Compras</label>
                <input type="checkbox" id="mod2" name="mod2" value="Biblioteca">
                <label for="mod2"> Biblioteca</label>
                <input type="checkbox" id="mod3" name="mod3" value="Academico">
                <label for="mod3"> Academico</label><br>
                <input type="checkbox" id="mod4" name="mod4" value="Documentação">
                <label for="mod4"> Documentação</label>
                <input type="checkbox" id="mod5" name="mod5" value="RecursosHumanos">
                <label for="mod5"> Recursos Humanos</label><br><br>

                <!--Botao salvar enviar-->
                <input type="button" id="salvar" name="salvar" value="Salvar">
                <input type="button" id="excluir" name="excluir" value="Excluir">

            </fieldset>
        </form>    
    </body>
</html>
